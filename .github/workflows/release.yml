name: Release

# Tag a release to build and publish cross-platform binaries that the composite action
# (action.yml) downloads. Example: `git tag v0.1.0 && git push origin v0.1.0`.
on:
  push:
    tags:
      - v[0-9]+.*

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: tfpin
          target: ${{ matrix.target }}
          # Stable, tag-independent asset names so action.yml can predict them:
          # tfpin-<target>.tar.gz (+ .sha256).
          archive: $bin-$target
          checksum: sha256
          tar: unix
          token: ${{ secrets.GITHUB_TOKEN }}
