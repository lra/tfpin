name: Release

# Tag a release to build and publish cross-platform binaries that the composite action
# (action.yml) downloads. Example: `git tag v0.1.0 && git push origin v0.1.0`.
on:
  push:
    tags:
      - v[0-9]+.*

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/create-gh-release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          # Both macOS targets build on the Apple-Silicon runner; the x86_64 binary is
          # cross-compiled there (Intel macos-13 runners have been retired).
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: tfpin
          target: ${{ matrix.target }}
          # Stable, tag-independent asset names so action.yml can predict them:
          # tfpin-<target>.tar.gz (+ .sha256).
          archive: $bin-$target
          checksum: sha256
          tar: unix
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    # Only publish to crates.io once binaries have built successfully for every target, so a
    # broken build never results in a half-released version. Requires a CARGO_REGISTRY_TOKEN
    # repository secret (Settings -> Secrets and variables -> Actions); the job is a no-op
    # without it.
    needs: upload-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --locked --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
